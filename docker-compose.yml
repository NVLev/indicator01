services:
  pg:
    image: postgres
    environment:
      POSTGRES_DB: indicator
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - indicator_net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d indicator" ]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer
    ports:
      - "8080:8080"
    networks:
      - indicator_net

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.org
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    networks:
      - indicator_net

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: indicator_backend
    ports:
      - "8000:8010"
    env_file:
      - .env
    volumes:
      - ./uploads:/app/uploads
      - ./processed_studies:/app/processed_studies
      - ./backend:/app/backend
    working_dir: /app/backend
    depends_on:
      pg:
        condition: service_healthy
    networks:
      - indicator_net

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - indicator_net

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app/backend
    environment:
      - APP_CONFIG__DB__URL=postgresql+asyncpg://user:password@pg:5432/indicator
      - REDIS_URL=redis://redis:6379/0
      - PYTHONPATH=/app/backend
    volumes:
      - ./uploads:/app/uploads
      - ./processed_studies:/app/processed_studies
      - ./backend:/app/backend
    depends_on:
      pg:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - indicator_net
    command: ["celery", "-A", "workers.tasks", "worker", "--loglevel=info", "--concurrency=2"]

  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app/backend
    environment:
      - APP_CONFIG__DB__URL=postgresql+asyncpg://user:password@pg:5432/indicator
      - REDIS_URL=redis://redis:6379/0
      - PYTHONPATH=/app/backend
    volumes:
      - ./uploads:/app/uploads
      - ./processed_studies:/app/processed_studies
      - ./backend:/app/backend
    depends_on:
      pg:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - indicator_net
    command: ["celery", "-A", "workers.tasks", "beat", "--loglevel=info"]

  flower:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app/backend
    ports:
      - "5555:5555"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - PYTHONPATH=/app/backend
    volumes:
      - ./backend:/app/backend
    depends_on:
      - redis
    networks:
      - indicator_net
    profiles:
      - monitoring
    command: ["celery", "-A", "workers.tasks", "flower", "--port=5555"]

volumes:
  pgdata:
  redis_data:

networks:
  indicator_net:
    driver: bridge